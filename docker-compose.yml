services:
  postgres:
    image: postgres:16-alpine
    container_name: breed-club-pg
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: breed_club
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
